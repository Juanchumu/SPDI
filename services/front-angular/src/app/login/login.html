<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            box-shadow: 0px 12px 32px rgba(0, 0, 0, 0.12);

<body class="h-full font-body-md text-on-surface bg-background">
<!-- Background Section with Image -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-overlay z-10"></div>
<img alt="Managed Forest Aerial View" class="w-full h-full object-cover scale-105" data-alt="A breathtaking high-angle aerial photograph of a vast, meticulously managed pine forest and adjacent agricultural fields. The lighting is the golden hour of sunset, casting long, soft shadows and highlighting the rich textures of the green canopy and the golden harvest land. The color palette is dominated by deep forest greens, earthy ochres, and a soft atmospheric haze, evoking a sense of calm authority and professional vigilance. The style is clean and cinematic, emphasizing the scale and value of the natural assets being protected by the platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkpahhVwiM31bNJnCiAy7lU-cJF5Uyu1enohADqUK0wujHtgSKgOcDmrFBJNgMTBPvH1W7oDBxUEk44g6PCVXCFaGSvhAXiF5oxJARlgTsmaqzlFX42Sl7HsjXI2S2VIDJVhtn6yTklmsHvA35nJRd5dAyMIR1Gyg9v5koAMRmlFnWyhwwKJgvT_wdoysNTPppKrHlEQf0doc7SzJkMAq0xmHun91JXsAJhmYyy2QE67EjpUG78990XtYAcnhO4_hCLktcFNjE_A"/>
</div>
<!-- Login Container -->
<main class="relative z-20 flex min-h-full items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-md">
<!-- White Centered Card -->
<div class="bg-surface-container-lowest login-card-shadow border border-outline-variant p-10 rounded-lg flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-10 text-center">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Ignis Guard</h1>
</div>
<p class="font-label-bold text-label-bold text-outline uppercase tracking-widest">Gestión de Riesgos</p>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-6" method="POST">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant block" for="username">
                            Nombre de Usuario
                        </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-[#8C9C82] rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface transition-all" id="username" name="username" placeholder="usuario@ignisguard.com" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface-variant block" for="password">
                                Contraseña
                            </label>
<a class="font-label-bold text-label-bold text-primary hover:underline transition-all" href="#">
                                ¿Olvidó su contraseña?
                            </a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-white border border-[#8C9C82] rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="pw_icon">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary-container text-white py-4 rounded-lg font-label-bold text-label-bold uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Iniciar Sesión</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
<!-- Footer Note -->
<div class="mt-8 pt-8 border-t border-outline-variant w-full text-center">
<div class="flex items-center justify-center gap-2 text-on-surface-variant mb-1">
<span class="material-symbols-outlined text-[16px]">shield</span>
<p class="font-body-sm text-body-sm font-medium">Acceso Seguro</p>
</div>
<p class="font-body-sm text-body-sm text-outline leading-relaxed">
                        Este portal es exclusivamente para agentes autorizados y administradores del sistema Ignis Guard.
                    </p>
</div>
</div>
<!-- Language / Copyright Footer (Optional) -->
<div class="mt-6 text-center">
<p class="font-body-sm text-body-sm text-surface-container-highest opacity-70">
                    © 2024 Ignis Guard Risk Management Platform.
                </p>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pw_icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Atmospheric micro-interaction for the background
        document.addEventListener('mousemove', (e) => {
            const img = document.querySelector('img');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            img.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
        });
    </script>
