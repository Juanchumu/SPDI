version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
    volumes:                           # 
      - ./data:/app/data               # 
      - ./descargas:/app/descargas     # 
    restart: unless-stopped
  validador:
    build:
      context: .
      dockerfile: ./validador/Dockerfile
    command: python -u -m app.validador
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    command: python -m app.worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
    volumes:                           # 
      - ./data:/app/data               # 
      - ./descargas:/app/descargas     # 
      - ./ordenes:/app/ordenes     # 
    restart: unless-stopped
  entrenador:
    build:
      context: .
      dockerfile: ./entrenador/Dockerfile
    command: python -m app.entrenador
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
    volumes:                           # 
      - ./dataset:/app/dataset     # 
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Panel web
    environment:
      MINIO_ROOT_USER: ${DB_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${DB_MINIO_PASS}
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  postgres_data:
