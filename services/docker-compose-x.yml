  analista-riesgo:
    build:
      context: .
      dockerfile: ./analista-riesgo/Dockerfile
    command: python -u -m app.analista
    depends_on:
      db:
        condition: service_healthy
          #api:
        #condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
        #MiniO 
      - DB_MINIO_USER=${DB_MINIO_USER}
      - DB_MINIO_PASS=${DB_MINIO_PASS}
        #ollama  
      - OLLAMA_URL_A=${OLLAMA_URL_A}
      - OLLAMA_MODEL_A=${OLLAMA_MODEL_A}
      - OLLAMA_URL_B=${OLLAMA_URL_B}
      - OLLAMA_TOKEN=${OLLAMA_TOKEN} 
    restart: unless-stopped
