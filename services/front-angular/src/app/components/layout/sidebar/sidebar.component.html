<aside class="h-screen w-64 fixed left-0 top-0 bg-surface border-r border-outline-variant flex flex-col py-6 z-20">
  <div class="px-gutter mb-8">
    <h1 class="font-headline-md text-headline-md font-bold text-primary">Ignis Guard</h1>
    <p class="text-on-surface-variant font-label-bold text-[10px] tracking-widest uppercase">Risk Management Pro</p>
  </div>
  <nav class="flex-1 px-4 space-y-1">
    <a routerLink="/dashboard"
       routerLinkActive="bg-surface-container-high text-primary font-bold border-r-4 border-primary"
       class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200">
      <span class="material-symbols-outlined">dashboard</span>
      <span>Dashboard</span>
    </a>
    <a routerLink="/informes-riesgo"
       routerLinkActive="bg-surface-container-high text-primary font-bold border-r-4 border-primary"
       class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200">
      <span class="material-symbols-outlined">landscape</span>
      <span>Informes de Riesgo</span>
    </a>
    <a routerLink="/informes-cliente"
       routerLinkActive="bg-surface-container-high text-primary font-bold border-r-4 border-primary"
       class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200">
      <span class="material-symbols-outlined">description</span>
      <span>Informes de Cliente</span>
    </a>
    @if ( isAdmin() ) {
    <a routerLink="/clientes"
       routerLinkActive="bg-surface-container-high text-primary font-bold border-r-4 border-primary"
       class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200" >
      <span class="material-symbols-outlined">groups</span>
      <span>Clientes</span>
    </a>
    }
  </nav>
  <div class="mt-auto px-gutter mb-6">
    <button class="w-full bg-secondary text-on-secondary py-3 rounded-lg font-label-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
      <span class="material-symbols-outlined">campaign</span>
      <span>Report Alert</span>
    </button>
  </div>
  <div class="px-4 space-y-1 border-t border-outline-variant pt-6">
    <button (click)="logout()" class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:bg-surface-container-high transition-colors w-full text-left">
      <span class="material-symbols-outlined">logout</span>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</aside>
