<div class="fixed inset-0 z-0 overflow-hidden">
  <div class="absolute inset-0 bg-overlay z-10"></div>
  <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkpahhVwiM31bNJnCiAy7lU-cJF5Uyu1enohADqUK0wujHtgSKgOcDmrFBJNgMTBPvH1W7oDBxUEk44g6PCVXCFaGSvhAXiF5oxJARlgTsmaqzlFX42Sl7HsjXI2S2VIDJVhtn6yTklmsHvA35nJRd5dAyMIR1Gyg9v5koAMRmlFnWyhwwKJgvT_wdoysNTPppKrHlEQf0doc7SzJkMAq0xmHun91JXsAJhmYyy2QE67EjpUG78990XtYAcnhO4_hCLktcFNjE_A"
       alt="Managed Forest"
       class="w-full h-full object-cover scale-105">
</div>

<main class="relative z-20 flex min-h-full items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-surface-container-lowest login-card-shadow border border-outline-variant p-10 rounded-lg flex flex-col items-center">
      <div class="mb-10 text-center">
        <div class="flex items-center justify-center gap-2 mb-2">
          <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
          <h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Ignis Guard</h1>
        </div>
        <p class="font-label-bold text-label-bold text-outline uppercase tracking-widest">Gestión de Riesgos</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="w-full space-y-6">
        <div class="space-y-2">
          <label class="font-label-bold text-label-bold text-on-surface-variant block" for="username">
            Nombre de Usuario
          </label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
            <input [(ngModel)]="username"
                   name="username"
                   id="username"
                   class="w-full pl-10 pr-4 py-3 bg-white border border-[#8C9C82] rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface transition-all"
                   placeholder="admin"
                   type="text" required>
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="font-label-bold text-label-bold text-on-surface-variant block" for="password">
              Contraseña
            </label>
            <a class="font-label-bold text-label-bold text-primary hover:underline transition-all" href="#">
              ¿Olvidó su contraseña?
            </a>
          </div>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
            <input [(ngModel)]="password"
                   name="password"
                   id="password"
                   [type]="showPassword ? 'text' : 'password'"
                   class="w-full pl-10 pr-10 py-3 bg-white border border-[#8C9C82] rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface transition-all"
                   placeholder="••••••••" required>
            <button type="button" (click)="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors">
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>
        @if (error) {
        <div  class="text-error text-sm text-center bg-error-container p-3 rounded-lg">
          {{ error }}
        </div>
        }

        <button type="submit"
                [disabled]="loading"
                class="w-full bg-primary-container text-white py-4 rounded-lg font-label-bold text-label-bold uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-50">
          <span>{{ loading ? 'Cargando...' : 'Iniciar Sesión' }}</span>
          <span class="material-symbols-outlined text-[18px]">login</span>
        </button>
      </form>

      <div class="mt-8 pt-8 border-t border-outline-variant w-full text-center">
        <div class="flex items-center justify-center gap-2 text-on-surface-variant mb-1">
          <span class="material-symbols-outlined text-[16px]">shield</span>
          <p class="font-body-sm text-body-sm font-medium">Acceso Seguro</p>
        </div>
        <p class="font-body-sm text-body-sm text-outline leading-relaxed">
          Este portal es exclusivamente para agentes autorizados y administradores del sistema Ignis Guard.
        </p>
      </div>
    </div>
    <div class="mt-6 text-center">
      <p class="font-body-sm text-body-sm text-surface-container-highest opacity-70">
        © 2024 Ignis Guard Risk Management Platform.
      </p>
    </div>
  </div>
</main>
