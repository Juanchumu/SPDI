version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "8000:8000"
    #healthcheck:
      #test: ["CMD","curl", "-f", "http://localhost:8000/docs"]
      #interval: 5s
      #timeout: 5s
      #retries: 10
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    # Montamos el código fuente para Hot Reload
    #volumes:
    #  - ./api/app:/app/app
    # Lanzamos la API con --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped 
  front-angular:
    build:
      context: .
      dockerfile: ./front-angular/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      db:
        condition: service_healthy
          #api:
        #condition: service_healthy
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
    # esto tendria que ser una copia de archivos y no un volumen
      - ../web_interface:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  validador:
    build:
      context: .
      dockerfile: ./validador/Dockerfile
    command: python -u -m app.validador
    depends_on:
      db:
        condition: service_healthy
          #api:
        #condition: service_healthy

    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  worker-x:
    build:
      context: .
      dockerfile: ./worker-x/Dockerfile
    command: python -u -m app.worker
    depends_on:
      db:
        condition: service_healthy
          #api:
          #condition: service_healthy

    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
      - DB_MINIO_USER=${DB_MINIO_USER}
      - DB_MINIO_PASS=${DB_MINIO_PASS}
        #volumes:                           # 
        #- ./data:/app/data               # 
        #- ./descargas:/app/descargas     # 
        #- ./ordenes:/app/ordenes     # 
    restart: unless-stopped
  entrenador-x:
    build:
      context: .
      dockerfile: ./entrenador-x/Dockerfile
    command: python -u -m app.entrenador
    depends_on:
      db:
        condition: service_healthy
          #api:
          #condition: service_healthy

    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
      - DB_MINIO_USER=${DB_MINIO_USER}
      - DB_MINIO_PASS=${DB_MINIO_PASS}
        #volumes:                           # 
        #- ./dataset:/app/dataset     # 
    restart: unless-stopped
  analista:
    build:
      context: .
      dockerfile: ./analista/Dockerfile
    command: python -u -m app.analista
    depends_on:
      db:
        condition: service_healthy
          #api:
        #condition: service_healthy

    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
        #MiniO 
      - DB_MINIO_USER=${DB_MINIO_USER}
      - DB_MINIO_PASS=${DB_MINIO_PASS}
        #ollama  
      - OLLAMA_URL_A=${OLLAMA_URL_A}
      - OLLAMA_MODEL_A=${OLLAMA_MODEL_A}
      - OLLAMA_URL_B=${OLLAMA_URL_B}
      - OLLAMA_TOKEN=${OLLAMA_TOKEN} 
    restart: unless-stopped
  analista-cliente:
    build:
      context: .
      dockerfile: ./analista-cliente/Dockerfile
    command: python -u -m app.analista
    depends_on:
      db:
        condition: service_healthy
