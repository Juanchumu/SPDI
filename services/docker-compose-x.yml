  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Panel web
    environment:
      MINIO_ROOT_USER: ${DB_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${DB_MINIO_PASS}
    volumes:
      - minio_data:/data
  modelador-x:
    build:
      context: .
      dockerfile: ./modelador-x/Dockerfile
    command: python -u -m app.modelador
    depends_on:
      db:
        condition: service_healthy
          #api:
          #condition: service_healthy
      minio:
        condition: service_started
    environment:
      - DB_HOST=${DB_HOST}
